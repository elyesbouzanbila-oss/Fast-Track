<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link id="test" rel="stylesheet" href="test.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/21.0.0/i18next.min.js"></script>
    <link rel="stylesheet" href="validationform.css">
    <link id="select-style" rel="stylesheet" href="select.css">
    <link id="error-style" rel="stylesheet" href="erroe.css">
    <link id="form1-style" rel="stylesheet" href="form1.css">
    <link id="nav-style" rel="stylesheet" href="nav2.css">
</head>
<body class="french">
  <div class="select-wrapper"></div>
  <select id="languageSelect" onchange="changeLanguage(this.value)" class="language-select" >
        <option value="fr">Français</option>
        <option value="en">English</option>
        <option value="ar">العربية</option>
    </select>
  </div>
  <button id="changeTheme"> <i id="themeIcon" class="fa-solid fa-moon"></i> </button>
  
  <h3 data-i18n="title_2">transport on tunis</h3>
  <div class="cont-img">
    <img src="logo.png" alt="Logo" class="logo">
  </div>

  <form class="card" id="signupForm">
    <div class="bg">
      <h4 data-i18n="label_nom">Full Name</h4>
      <input type="text" name="name" id="name" required>
      <div class="error-message" id="error-name"></div>

      <h4 data-i18n="label_mail">Email</h4>
      <input type="email" name="email" id="email" required>
      <div class="error-message" id="error-email"></div>

      <h4 data-i18n="label_password">Password</h4>
      <div style="position: relative;">
        <input type="password" name="password" id="password" required style="padding-right: 40px;">
        <i class="fa-solid fa-eye" id="togglePassword" style="
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;"></i>
      </div>
      <div class="error-message" id="error-password"></div>

      <button type="button" id="submitBtn" class="submit" data-i18n="submit_btn">Sign Up</button>
      <p style="text-align: center; margin-top: 20px;">
        Already have an account? <a href="login1.html" style="color: gold;">Login here</a>
      </p>
    </div>
    <div class="blob"></div>
  </form>

  <script src="config.js"></script>
  <script src="api-client.js"></script>
  <script src="translate.js"></script>
  <script src="lighdark.js"></script>
  <script src="img.js"></script>
  <script>
    // Sign Up Integration
    const signupForm = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');

    // Toggle password visibility
    togglePassword.addEventListener('click', () => {
      passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
      togglePassword.classList.toggle('fa-eye');
      togglePassword.classList.toggle('fa-eye-slash');
    });

    // Form submission
    submitBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      
      // Clear previous errors
      document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
      
      // Validate inputs
      let hasErrors = false;
      
      if (!nameInput.value.trim()) {
        document.getElementById('error-name').textContent = 'Name is required';
        hasErrors = true;
      }
      
      if (!emailInput.value.trim()) {
        document.getElementById('error-email').textContent = 'Email is required';
        hasErrors = true;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value)) {
        document.getElementById('error-email').textContent = 'Invalid email format';
        hasErrors = true;
      }
      
      if (!passwordInput.value) {
        document.getElementById('error-password').textContent = 'Password is required';
        hasErrors = true;
      } else if (passwordInput.value.length < 8) {
        document.getElementById('error-password').textContent = 'Password must be at least 8 characters';
        hasErrors = true;
      }
      
      if (hasErrors) return;
      
      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account...';
        
        const response = await navigationAPI.signup(
          nameInput.value,
          emailInput.value,
          passwordInput.value
        );
        
        if (response.success) {
          // Redirect to home page
          window.location.href = 'home page.html';
        } else {
          if (response.details && Array.isArray(response.details)) {
            response.details.forEach(error => {
              const fieldId = `error-${error.param}`;
              const errorEl = document.getElementById(fieldId);
              if (errorEl) {
                errorEl.textContent = error.msg;
              }
            });
          } else {
            alert(response.error || 'Sign up failed');
          }
        }
      } catch (error) {
        alert(error.message || 'Network error. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign Up';
      }
    });
  </script>
</body>
</html>
