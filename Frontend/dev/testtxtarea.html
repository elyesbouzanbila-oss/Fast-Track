<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* wrapper */
.textarea-wrapper {
  position: relative;
  width: 300px;
  margin-top: 20px;
}

/* textarea */
.textarea-wrapper textarea {
  width: 100%;
  min-height: 120px;
  padding: 15px;
  border-radius: 12px;
  border: 2px solid gold;
  background: #000;
  color: #FFD700;
  font-size: 14px;
  outline: none;
  resize: none;
  transition: all 0.3s ease;
}

/* hover */
.textarea-wrapper textarea:hover {
  box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
}

/* focus */
.textarea-wrapper textarea:focus {
  border-color: #FFD700;
  box-shadow: 0 0 12px rgba(255, 215, 0, 0.8);
}

/* label (floating effect) */
.textarea-wrapper label {
  position: absolute;
  top: 50%;
  left: 15px;
  transform: translateY(-75%);
  color: #FFD700;
  pointer-events: none;
  transition: 0.3s ease;
  background: transparent;
  padding: 0 5px;
  opacity: 0.7;
}

/* animation label */
.textarea-wrapper textarea:focus + label,
.textarea-wrapper textarea:valid + label {
  top: -8px;
  font-size: 12px;
  opacity: 1;
}
labal {
    background: transparent;
}
    </style>
</head>
<body>
    <div class="textarea-wrapper">
  <textarea id="message" required></textarea>
  <label for="message">description de problème</label>
</div>
</body>
</html>
