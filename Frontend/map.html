<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transport Map</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  background-color: black;
  color: gold;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: gold;
}

#controls {
  margin: 10px;
}

select, button {
  padding: 8px;
  margin: 5px;
  border-radius: 5px;
  border: none;
  background-color: gold;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background-color: #e6c200;
}

#map {
  height: 500px;
  margin: 20px;
  border: 3px solid gold;
  border-radius: 10px;
}

#routeInfo {
  color: gold;
  margin-top: 20px;
  font-weight: bold;
}

#hazardsList {
  margin-top: 20px;
  color: gold;
  text-align: left;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

.hazard-item {
  background: rgba(184, 134, 11, 0.1);
  padding: 10px;
  margin: 5px 0;
  border-left: 3px solid gold;
  border-radius: 3px;
}
</style>
</head>

<body>

<h1>🚍 Transport Route Finder</h1>

<div id="controls">
  <select id="from"></select>
  <select id="to"></select>
  <button onclick="getRoute()">Afficher Route</button>
</div>

<div id="map"></div>
<div id="routeInfo"></div>
<div id="hazardsList"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="config.js"></script>
<script src="api-client.js"></script>

<script>
// 🗺️ Map initialization
const map = L.map('map').setView([36.8065, 10.1815], 7);

// 🌙 Dark map
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap & CartoDB'
}).addTo(map);

// 📍 Stations
const stations = [
  { name: "Tunis", lat: 36.8065, lng: 10.1815 },
  { name: "Sousse", lat: 35.8256, lng: 10.6369 },
  { name: "Sfax", lat: 34.7406, lng: 10.7603 },
  { name: "Bizerte", lat: 37.2744, lng: 9.8739 }
];

// 🎨 Yellow icon
const goldIcon = L.icon({
  iconUrl: 'https://maps.google.com/mapfiles/ms/icons/yellow-dot.png',
  iconSize: [32, 32]
});

// 🔴 Red icon for hazards
const hazardIcon = L.icon({
  iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
  iconSize: [32, 32]
});

// 📌 Add stations to map
stations.forEach(station => {
  L.marker([station.lat, station.lng], { icon: goldIcon })
    .addTo(map)
    .bindPopup(station.name);
});

// 📋 Fill dropdowns
const fromSelect = document.getElementById("from");
const toSelect = document.getElementById("to");

stations.forEach((station, index) => {
  fromSelect.innerHTML += `<option value="${index}">${station.name}</option>`;
  toSelect.innerHTML += `<option value="${index}">${station.name}</option>`;
});

let routeLayer = null;
let hazardMarkers = [];

// 🚍 Calculate route via API
async function getRoute() {
  const start = stations[fromSelect.value];
  const end = stations[toSelect.value];

  if (routeLayer) {
    map.removeLayer(routeLayer);
  }

  // Clear previous hazard markers
  hazardMarkers.forEach(marker => map.removeLayer(marker));
  hazardMarkers = [];

  try {
    // Calculate route via API
    const response = await navigationAPI.calculateRoute(
      { lat: start.lat, lng: start.lng },
      { lat: end.lat, lng: end.lng },
      'car'
    );

    if (response.success) {
      const route = response.data.route.geometry;
      const distance = response.data.route.distance;
      const duration = response.data.route.duration;

      // Display route on map
      routeLayer = L.geoJSON(route, {
        style: {
          color: "gold",
          weight: 5
        }
      }).addTo(map);

      map.fitBounds(routeLayer.getBounds());

      // Display route info
      document.getElementById('routeInfo').innerHTML = 
        `<p>Distance: ${(distance / 1000).toFixed(2)} km | Duration: ${Math.round(duration / 60)} minutes</p>`;

      // Display hazards if any
      if (response.data.hazards && response.data.hazards.hazards.length > 0) {
        let hazardsHtml = '<div id="hazardsList"><h3>⚠️ Hazards Detected:</h3>';
        
        response.data.hazards.hazards.forEach(hazard => {
          // Add hazard marker to map
          const marker = L.marker([hazard.lat, hazard.lng], { icon: hazardIcon })
            .addTo(map)
            .bindPopup(`<strong>${hazard.type}</strong><br>Severity: ${hazard.severity}`);
          hazardMarkers.push(marker);

          // Add to list
          hazardsHtml += `
            <div class="hazard-item">
              <strong>${hazard.type}</strong> (${hazard.severity})<br>
              Distance to route: ${hazard.distance_to_route.toFixed(1)}m
            </div>
          `;
        });
        
        hazardsHtml += '</div>';
        document.getElementById('hazardsList').innerHTML = hazardsHtml;
      }
    }
  } catch (error) {
    alert("Error calculating route: " + error.message);
    console.error(error);
  }
}
</script>

</body>
</html>
