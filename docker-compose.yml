

services:
  # PostgreSQL with PostGIS extension
  postgres:
    image: postgis/postgis:15-3.4
    container_name: nav_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-navdb}
      POSTGRES_USER: ${DB_USER:-navuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-navpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nav_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-navuser} -d ${DB_NAME:-navdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OSRM for car routing
  osrm-car:
    image: osrm/osrm-backend:latest
    container_name: nav_osrm_car
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./Backend/osrm-data:/data
    networks:
      - nav_network
    command: >
      osrm-routed
      --algorithm mld
      /data/map.osrm
      --max-table-size 10000

  # OSRM for foot routing
  osrm-foot:
    image: osrm/osrm-backend:latest
    container_name: nav_osrm_foot
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - ./Backend/osrm-data:/data
    networks:
      - nav_network
    command: >
      osrm-routed
      --algorithm mld
      /data/map.osrm

  # Node.js Backend API
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: nav_api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-navdb}
      DB_USER: ${DB_USER:-navuser}
      DB_PASSWORD: ${DB_PASSWORD:-navpassword}
      OSRM_CAR_URL: https://router.project-osrm.org
      OSRM_FOOT_URL: https://router.project-osrm.org
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nav_network

  # Frontend (Static Server)
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: nav_frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - api
    networks:
      - nav_network
    environment:
      API_URL: http://api:3000

  # Optional: Nginx reverse proxy (for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: nav_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
  #     - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro
  #   depends_on:
  #     - api
  #     - frontend
  #   networks:
  #     - nav_network

networks:
  nav_network:
    driver: bridge

volumes:
  postgres_data:
